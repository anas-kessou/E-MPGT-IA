

services:
  # ── Vector Database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: empgt-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    networks:
      - empgt-network

  # ── Knowledge Graph ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: empgt-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/empgt_neo4j_2026
      NEO4J_PLUGINS: '["apoc"]'
    restart: unless-stopped
    networks:
      - empgt-network

  # ── Relational Database ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: empgt-postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: empgt
      POSTGRES_USER: empgt_user
      POSTGRES_PASSWORD: empgt_pass_2026
    restart: unless-stopped
    networks:
      - empgt-network

  # ── Document Storage (S3 Compatible) ────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: empgt-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: empgt_admin
      MINIO_ROOT_PASSWORD: empgt_minio_2026
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - empgt-network

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
  minio_data:

networks:
  empgt-network:
    driver: bridge
